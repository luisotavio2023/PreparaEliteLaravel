<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PreparaElite - Cadastro</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Fonte bonita -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- ÍCONES -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="card-header">
            <img src="imagens/logo.png" alt="Logo">
        </div>
        <div class="card-body">
            <h1 class="titulo">Crie sua conta</h1>
            <p class="subtitulo">Preencha os dados abaixo</p>
            <form>
                <input type="text" placeholder="Nome completo">
                <input type="email" placeholder="E-mail">
                <input type="password" placeholder="Senha">
                <button type="submit" class="btn">Criar conta</button>
            </form>
            <div class="divider">ou</div>
            <button class="social google mb">
                <i class="ri-google-fill"></i>
                Continuar com Google
            </button>
            <button class="social apple">
                <i class="ri-apple-fill"></i>
                Continuar com Apple
            </button>
        </div>
    </div>
    <footer>
        <div class="footer-col">
            <h4>Sobre nós</h4>
            <p>PreparaElite Concursos – A plataforma mais completa para sua preparação em concursos públicos.</p>
        </div>
        <div class="footer-col">
            <h4>Links</h4>
            <a href="#">Termos de uso</a>
            <a href="#">Política de privacidade</a>
            <a href="#">Contato</a>
        </div>
        <div class="footer-col">
            <h4>Redes sociais</h4>
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
            <a href="#">YouTube</a>
        </div>
    </footer>
</body>
</html>
