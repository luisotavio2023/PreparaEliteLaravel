<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PreparaElite - Cadastro</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Fonte bonita -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- ÍCONES -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- FONTE AWESOME-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
    <div class="card">
        <div class="card-header">
            <img src="imagens/logo.png" alt="Logo">
        </div>
        <div class="card-body">
            <h1 class="titulo">Crie sua conta</h1>
            <p class="subtitulo">Preencha os dados abaixo</p>
            <form>
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" placeholder="Nome completo">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" placeholder="E-mail">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" placeholder="Senha">
                </div>
                <button type="submit" class="btn">Criar conta</button>
            </form>
            <div class="divider">ou</div>
            <button class="social google mb">
                <i class="ri-google-fill"></i>
                Continuar com Google
            </button>
            <button class="social apple">
                <i class="ri-apple-fill"></i>
                Continuar com Apple
            </button>
        </div>
    </div>
    <footer>
    <div class="footer-col">
        <h4>Sobre nós</h4>
        <p>PreparaElite Concursos - A plataforma mais completa para sua preparação em concursos públicos.</p>
    </div>
    <div class="footer-col">
        <h4>Links</h4>
        <a href="#">Termos de uso</a>
        <a href="#">Política de privacidade</a>
        <a href="#">Contato</a>
    </div>
    <div class="footer-col">
        <h4>Redes sociais</h4>
        <a href="#">Instagram</a>
        <a href="#">Facebook</a>
        <a href="#">YouTube</a>
    </div>
</footer>
</body>
</html>
